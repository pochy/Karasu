<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles/app.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karasu</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app" class="app">
      <header class="toolbar" role="toolbar" aria-label="メインツールバー">
        <button
          type="button"
          id="btn-toggle-sidebar"
          aria-expanded="false"
          aria-controls="app-sidebar"
        >
          一覧
        </button>
        <button type="button" id="btn-open" aria-label="ファイルを開く">
          開く
        </button>
        <button type="button" id="btn-save-as" aria-label="別名で保存">
          別名で保存
        </button>
        <button type="button" id="btn-toggle-view" aria-label="編集とプレビューを切り替え">
          プレビュー
        </button>
        <button
          type="button"
          id="btn-json-format"
          hidden
          aria-label="JSON を整形"
        >
          整形
        </button>
        <button
          type="button"
          id="btn-json-tree"
          hidden
          aria-label="編集とツリー表示を切り替え"
        >
          ツリー
        </button>
        <button
          type="button"
          id="btn-settings"
          aria-haspopup="dialog"
        >
          設定
        </button>
        <span id="file-name" class="file-name" aria-live="polite">未選択</span>
      </header>

      <div id="workspace" class="workspace sidebar-hidden">
        <nav
          id="activity-bar"
          class="activity-bar"
          role="navigation"
          aria-label="エディタ切り替え"
        ></nav>

        <aside id="app-sidebar" class="sidebar" aria-label="ファイル一覧">
          <div class="sidebar-header">
            <button type="button" id="btn-open-folder">フォルダを開く</button>
            <button type="button" id="btn-new-file" disabled>新規</button>
            <button
              type="button"
              id="btn-refresh-tree"
              class="sidebar-icon-btn"
              aria-label="一覧を再読み込み"
              title="再読み込み"
            >
              ↻
            </button>
          </div>
          <p id="workspace-root-label" class="workspace-root-label">
            作業フォルダ未選択
          </p>
          <section class="recent-files" aria-label="最近開いたファイル">
            <h3 class="sidebar-section-title">最近</h3>
            <div id="recent-files-list" class="recent-files-list"></div>
          </section>
          <div class="sidebar-search-row">
            <input
              id="sidebar-filter"
              class="sidebar-filter"
              type="search"
              placeholder="ファイル名で絞り込み"
              autocomplete="off"
            />
            <button
              type="button"
              id="btn-search-files"
              class="sidebar-icon-btn"
              title="作業フォルダ内を検索"
              aria-label="作業フォルダ内を検索"
            >
              検索
            </button>
          </div>
          <div id="search-results" class="search-results" hidden></div>
          <nav id="file-tree" class="file-tree"></nav>
        </aside>

        <div class="main-pane">
          <div
            id="error-banner"
            class="error-banner"
            role="alert"
            hidden
          ></div>

          <main class="content">
            <div id="markdown-screen" class="editor-screen">
              <textarea
                id="editor"
                class="markdown-editor"
                aria-label="Markdown エディタ"
                spellcheck="false"
                placeholder="ファイルを開くか、ここに Markdown を入力してください"
              ></textarea>
              <article
                id="preview"
                class="preview"
                aria-label="Markdown プレビュー"
                hidden
              ></article>
            </div>
            <div id="json-screen" class="editor-screen" hidden>
              <textarea
                id="json-editor"
                class="json-editor"
                aria-label="JSON エディタ"
                spellcheck="false"
                placeholder="ファイルを開くか、ここに JSON を入力してください"
              ></textarea>
              <div
                id="json-tree"
                class="json-tree"
                aria-label="JSON ツリー"
                hidden
              ></div>
            </div>
            <div id="csv-screen" class="editor-screen" hidden>
              <div class="csv-toolbar">
                <span id="csv-meta" aria-live="polite"></span>
                <button
                  type="button"
                  id="btn-csv-close"
                  disabled
                  aria-label="開いている CSV を閉じてメモリを解放"
                >
                  解放
                </button>
              </div>
              <div id="csv-index-progress" class="csv-index-progress" hidden>
                <progress id="csv-index-progress-bar"></progress>
                <span id="csv-index-progress-label"></span>
              </div>
              <div id="csv-scroll" class="csv-scroll" aria-label="CSV スプレッドシート">
                <div id="csv-table-inner" class="csv-table-inner">
                  <table id="csv-table" class="csv-table">
                    <thead id="csv-thead"></thead>
                    <tbody id="csv-tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </main>

          <footer class="statusbar" aria-live="polite">
            <span id="file-path" class="file-path" hidden></span>
            <span id="save-status" class="save-status save-status--saved"
              >保存済み</span
            >
          </footer>
        </div>
      </div>
    </div>

    <div id="settings-overlay" class="settings-overlay" hidden>
      <div
        id="settings-dialog"
        class="settings-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settings-title"
        tabindex="-1"
      >
        <header class="settings-header">
          <h2 id="settings-title" class="settings-title">表示設定</h2>
          <button
            type="button"
            id="btn-settings-close"
            class="settings-close"
            aria-label="閉じる"
          >
            ×
          </button>
        </header>
        <div class="settings-body">
          <p id="settings-fonts-status" class="settings-fonts-status" hidden>
            インストール済みフォントを読み込み中…
          </p>
          <div class="settings-row">
            <label for="setting-editor-font-filter">編集フォント</label>
            <input
              id="setting-editor-font-filter"
              type="search"
              placeholder="フォント名で検索"
              autocomplete="off"
            />
            <select id="setting-editor-font" size="6" aria-label="編集フォント一覧"></select>
          </div>
          <div class="settings-row">
            <label for="setting-editor-size">
              編集サイズ
              <output id="setting-editor-size-value" for="setting-editor-size"></output>
            </label>
            <input id="setting-editor-size" type="range" step="1" />
          </div>
          <div class="settings-row">
            <label for="setting-preview-font-filter">プレビューフォント</label>
            <input
              id="setting-preview-font-filter"
              type="search"
              placeholder="フォント名で検索"
              autocomplete="off"
            />
            <select id="setting-preview-font" size="6" aria-label="プレビューフォント一覧"></select>
          </div>
          <div class="settings-row">
            <label for="setting-preview-size">
              プレビューサイズ
              <output
                id="setting-preview-size-value"
                for="setting-preview-size"
              ></output>
            </label>
            <input id="setting-preview-size" type="range" step="1" />
          </div>
          <div class="settings-row settings-row--checkbox">
            <label>
              <input id="setting-editor-light" type="checkbox" />
              エディタを常にライト表示
            </label>
          </div>
          <div class="settings-row settings-row--checkbox">
            <label>
              <input id="setting-file-watch" type="checkbox" />
              作業フォルダの変更を自動反映（ファイル監視）
            </label>
          </div>
        </div>
        <footer class="settings-footer">
          <button type="button" id="btn-settings-reset" class="settings-reset">
            初期値に戻す
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
